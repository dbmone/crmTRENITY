version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: crm_creators
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crm_super_secret_2024}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_creators"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://crm_user:${DB_PASSWORD:-crm_super_secret_2024}@postgres:5432/crm_creators
      PORT: "3000"
      HOST: "0.0.0.0"
      JWT_SECRET: ${JWT_SECRET:-change_me}
      BOT_TOKEN: ${BOT_TOKEN}
      TELEGRAM_STORAGE_CHAT_ID: ${TELEGRAM_STORAGE_CHAT_ID}
      USE_TELEGRAM_STORAGE: ${USE_TELEGRAM_STORAGE:-true}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  bot:
    build: ./bot
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://crm_user:${DB_PASSWORD:-crm_super_secret_2024}@postgres:5432/crm_creators
      PORT: "3001"
      BOT_TOKEN: ${BOT_TOKEN}
      TELEGRAM_STORAGE_CHAT_ID: ${TELEGRAM_STORAGE_CHAT_ID}
      ADMIN_TG_USERNAME: ${ADMIN_TG_USERNAME}
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:3000
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  pgdata:
