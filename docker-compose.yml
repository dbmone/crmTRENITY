version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: crm_creators
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crm_super_secret_2024}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_creators"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://crm_user:${DB_PASSWORD:-crm_super_secret_2024}@postgres:5432/crm_creators
      PORT: "3000"
      HOST: "0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    build: ./bot
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://crm_user:${DB_PASSWORD:-crm_super_secret_2024}@postgres:5432/crm_creators
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:3000
      PORT: "80"
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
