name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: dbmone

jobs:
  # ─── Build three images in parallel ───────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ env.OWNER }}/crmtrenity-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./bot
          push: true
          tags: ghcr.io/${{ env.OWNER }}/crmtrenity-bot:latest
          cache-from: type=gha,scope=bot
          cache-to: type=gha,mode=max,scope=bot

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ env.OWNER }}/crmtrenity-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ─── Deploy: pull pre-built images on server ──────────────────────────────
  deploy:
    needs: [build-backend, build-bot, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "docker-compose.yml"
          target: "/root/deploy/"

      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_COMPOSE_DIR: ${{ secrets.DEPLOY_COMPOSE_DIR }}
          DEPLOY_PROJECT_NAME: ${{ secrets.DEPLOY_PROJECT_NAME }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: DEPLOY_COMPOSE_DIR,DEPLOY_PROJECT_NAME
          script_stop: true
          script: |
            set -eu

            # login to ghcr.io (PAT with read:packages)
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u dbmone --password-stdin

            # allow explicit compose dir from GitHub secret for reliability
            COMPOSE_DIR="${DEPLOY_COMPOSE_DIR:-}"

            # otherwise try to discover Portainer stack directory
            if [ -z "$COMPOSE_DIR" ]; then
              COMPOSE_FILE="$(find /var/lib/docker/volumes/portainer_data/_data/compose \
                -type f -name docker-compose.yml 2>/dev/null | head -n 1 || true)"

              if [ -n "$COMPOSE_FILE" ]; then
                COMPOSE_DIR="$(dirname "$COMPOSE_FILE")"
              fi
            fi

            if [ -z "$COMPOSE_DIR" ]; then
              echo "ERROR: compose directory not found"
              echo "Hint: set GitHub secret DEPLOY_COMPOSE_DIR to the exact stack folder on the server"
              echo "Example: /var/lib/docker/volumes/portainer_data/_data/compose/15"
              exit 1
            fi

            echo "Using compose dir: $COMPOSE_DIR"

            PROJECT_ARGS=""
            if [ -n "${DEPLOY_PROJECT_NAME:-}" ]; then
              PROJECT_ARGS="-p $DEPLOY_PROJECT_NAME"
              echo "Using compose project: $DEPLOY_PROJECT_NAME"
            fi

            # update compose file with latest version (has image: tags)
            cp /root/deploy/docker-compose.yml "$COMPOSE_DIR/docker-compose.yml"

            cd "$COMPOSE_DIR"

            # detect env file (portainer uses stack.env or .env)
            ENV_FILE=""
            if [ -f "stack.env" ]; then ENV_FILE="--env-file stack.env"; fi

            # pull new images (no rebuild on server)
            docker compose $PROJECT_ARGS $ENV_FILE pull backend bot frontend

            # stop old app containers (free ports before starting new ones)
            docker compose $PROJECT_ARGS $ENV_FILE stop backend bot frontend || true

            # kill any stray containers still holding the ports
            for PORT in 3000 3001 8080; do
              CID=$(docker ps -q --filter "publish=$PORT")
              if [ -n "$CID" ]; then
                echo "Killing container $CID on port $PORT"
                docker stop "$CID" || true
              fi
            done

            # start with new images (compose handles dependency order: backend healthy → bot)
            docker compose $PROJECT_ARGS $ENV_FILE up -d --no-build --force-recreate backend bot frontend
