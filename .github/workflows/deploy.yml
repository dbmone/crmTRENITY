name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: dbmone

jobs:
  # ─── Build three images in parallel ───────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ env.OWNER }}/crmtrenity-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./bot
          push: true
          tags: ghcr.io/${{ env.OWNER }}/crmtrenity-bot:latest
          cache-from: type=gha,scope=bot
          cache-to: type=gha,mode=max,scope=bot

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ env.OWNER }}/crmtrenity-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ─── Deploy: pull pre-built images on server ──────────────────────────────
  deploy:
    needs: [build-backend, build-bot, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "docker-compose.yml"
          target: "/root/deploy/"

      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            # login to ghcr.io (PAT with read:packages)
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u dbmone --password-stdin

            # find compose folder regardless of portainer numbering
            COMPOSE_DIR=$(find /var/lib/docker/volumes/portainer_data/_data/compose \
              -name "docker-compose.yml" 2>/dev/null | head -1 | xargs dirname)

            if [ -z "$COMPOSE_DIR" ]; then
              echo "ERROR: compose directory not found"
              exit 1
            fi

            echo "Using compose dir: $COMPOSE_DIR"

            # update compose file with latest version (has image: tags)
            cp /root/deploy/docker-compose.yml "$COMPOSE_DIR/docker-compose.yml"

            cd "$COMPOSE_DIR"

            # detect env file (portainer uses stack.env or .env)
            ENV_FILE=""
            if [ -f "stack.env" ]; then ENV_FILE="--env-file stack.env"; fi

            # pull new images (no rebuild on server)
            docker compose $ENV_FILE pull backend bot frontend

            # stop old app containers (free ports before starting new ones)
            docker compose $ENV_FILE stop backend bot frontend || true

            # kill any stray containers still holding the ports
            for PORT in 3000 3001 8080; do
              CID=$(docker ps -q --filter "publish=$PORT")
              if [ -n "$CID" ]; then
                echo "Killing container $CID on port $PORT"
                docker stop "$CID" || true
              fi
            done

            # start with new images, keep postgres/g4f running
            docker compose $ENV_FILE up -d --no-build --no-deps --force-recreate backend bot frontend
